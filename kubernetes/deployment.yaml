apiVersion: apps/v1
kind: Deployment
metadata:
  name: halandpet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: halandpet
  template:
    metadata:
      labels:
        app: halandpet
    spec:
      containers:
        - name: halandpet
          image: halandpet:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: halandpet-secrets
                  key: database-url
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: halandpet-secrets
                  key: session-secret
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: halandpet-secrets
                  key: nextauth-secret
          readinessProbe:
            httpGet:
              path: /api/ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: halandpet
spec:
  selector:
    app: halandpet
  ports:
    - port: 80
      targetPort: 3000
