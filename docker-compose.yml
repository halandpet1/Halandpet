version: '3.9'
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: halandpet
      POSTGRES_USER: halandpet
      POSTGRES_PASSWORD: halandpet
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U halandpet -d halandpet']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL:-postgresql://halandpet:halandpet@db:5432/halandpet?schema=public}
      DATABASE_POOL_URL: ${DATABASE_POOL_URL:-postgresql://halandpet:halandpet@db:5432/halandpet?schema=public}
      DIRECT_URL: ${DIRECT_URL:-postgresql://halandpet:halandpet@db:5432/halandpet?schema=public}
      SESSION_SECRET: ${SESSION_SECRET:-<GENERATE_RANDOM_32_BYTES>}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-<GENERATE_RANDOM_32_BYTES>}
      RATE_LIMIT_STORE: ${RATE_LIMIT_STORE:-memory}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '3000:3000'
    restart: unless-stopped
