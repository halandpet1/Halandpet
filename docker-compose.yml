version: '3.9'
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: halandpet
      POSTGRES_USER: halandpet
      POSTGRES_PASSWORD: halandpet
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U halandpet -d halandpet']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://halandpet:halandpet@db:5432/halandpet?schema=public
      SESSION_SECRET: change-me-in-production
      NEXTAUTH_SECRET: change-me-in-production
      RATE_LIMIT_STORE_FILE: /tmp/rate-limit-store.json
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '3000:3000'
    restart: unless-stopped
