name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma validate
      - run: npm run lint
      - run: npm run test
      - run: npm run test:coverage
      - run: npx tsc --noEmit
      - run: npm run build
